<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-teal { fill: #17a697; }
      .logo-white { fill: white; }
    </style>
  </defs>
  
  <!-- Outer left hand/guard -->
  <path class="logo-teal" d="M 50 80 L 50 50 L 75 75 L 75 130 Z" />
  
  <!-- Outer right hand/guard -->
  <path class="logo-teal" d="M 150 80 L 150 50 L 125 75 L 125 130 Z" />
  
  <!-- Top curved section -->
  <path class="logo-teal" d="M 75 50 L 125 50 Q 140 40 150 45 L 150 80 L 75 80 Z" />
  
  <!-- Bottom left section -->
  <path class="logo-teal" d="M 50 130 L 75 130 L 75 160 L 50 180 Z" />
  
  <!-- Bottom right section -->
  <path class="logo-teal" d="M 150 130 L 125 130 L 125 160 L 150 180 Z" />
  
  <!-- Bottom center section -->
  <path class="logo-teal" d="M 75 160 L 125 160 L 125 180 L 75 180 Z" />
  
  <!-- Inner white code brackets -->
  <g transform="translate(100, 100)">
    <!-- Left bracket < -->
    <path class="logo-white" d="M -20 -25 L -35 -15 L -20 0 L -35 15 L -20 25" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket > -->
    <path class="logo-white" d="M 20 -25 L 35 -15 L 20 0 L 35 15 L 20 25" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Lightning bolt at top -->
  <g transform="translate(100, 35)">
    <path class="logo-white" d="M 0 -15 L 8 0 L 0 0 L 12 20 L -5 5 L 0 5 Z" />
  </g>
</svg>