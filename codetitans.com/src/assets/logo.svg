<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#17a697" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer hexagonal C shape - left side -->
    <path d="M 60 50 L 100 30 L 140 50"/>
    
    <!-- Right side going down -->
    <path d="M 140 50 L 160 80 L 160 120 L 140 150"/>
    
    <!-- Bottom right -->
    <path d="M 140 150 L 100 170 L 60 150"/>
    
    <!-- Left side going up -->
    <path d="M 60 150 L 40 120 L 40 80 L 60 50"/>
  </g>
  
  <!-- Inner hexagon outline -->
  <g stroke="#17a697" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 80 70 L 110 55 L 130 70 L 130 100 L 110 115 L 80 100 Z"/>
  </g>
  
  <!-- Code brackets < > -->
  <g stroke="#17a697" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left bracket < -->
    <path d="M 90 85 L 100 95 L 90 105"/>
    
    <!-- Right bracket > -->
    <path d="M 110 85 L 100 95 L 110 105"/>
  </g>
  
  <!-- Lightning bolt at top -->
  <g fill="#17a697">
    <path d="M 100 20 L 108 38 L 100 38 L 115 55 L 95 42 L 100 42 Z"/>
  </g>
</svg>